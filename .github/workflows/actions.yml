name: Build, Test, and Push image to Docker Hub

on: push
#  push:
#    branches: [ main ]
#  pull_request:
#    branches: [ main ]
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build goapp/ --tag ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:$(git rev-parse --short "$GITHUB_SHA")

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:$(git rev-parse --short "$GITHUB_SHA")

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Pull Image
      run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:$(git rev-parse --short "$GITHUB_SHA")

    - name: Run Container
      run: docker run -d -p 80:8080 ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:$(git rev-parse --short "$GITHUB_SHA")

    - name: Run Tests
      uses: liatrio/github-actions/apprentice-action@0b41561cca6822cc8d880fe0e49e7807a41fdf91

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: GCP Auth
      uses: google-github-actions/auth@v1
      with: 
        credentials_json: ${{ secrets.GOOGLE_SA_KEY }}

    - name: Deploy to Cloud Run
      run: gloud run deploy goapp --image docker.io/${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice"$(git rev-parse --short "$GITHUB_SHA") --region us-west1 --allow-unauthenticated --platform managed
