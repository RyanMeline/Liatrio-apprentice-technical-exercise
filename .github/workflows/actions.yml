name: Build, Test, and Deploy the Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build goapp/ --tag ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:${{ github.sha }}

    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push to Docker Hub
      if: github.event_name == 'push'
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:${{ github.sha }}

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Pull Image
      if: github.event_name == 'push'
      run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:${{ github.sha }}

    - name: Build Docker image
      if: github.event_name == 'pull_request'
      run: docker build goapp/ --tag ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:${{ github.sha }}

    - name: Run Container
      run: docker run -d -p 80:8080 ${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:${{ github.sha }}

    - name: Run Tests
      uses: liatrio/github-actions/apprentice-action@0b41561cca6822cc8d880fe0e49e7807a41fdf91

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - name: GCP Auth
      uses: google-github-actions/auth@v1
      with: 
        credentials_json: ${{ secrets.GOOGLE_SA_KEY }}

    - name: Deploy to Cloud Run
      run: gcloud run deploy goapp --image docker.io/${{ secrets.DOCKERHUB_USERNAME }}/liatrio-apprentice:${{ github.sha }} --region us-west1 --allow-unauthenticated
